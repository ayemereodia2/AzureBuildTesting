# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- none

pool:
    vmImage: 'windows-latest'

variables:
    buildPlatform: 'Any CPU'
    buildConfiguration: 'Release'
    solution: '**/RoundTheCode.AzureTestProject.sln'
    project: '**/RoundTheCode.AzureTestProject.csproj'

steps:

- task: UseDotNet@2
  name: 'SDKInstaller'
  displayName: 'SDK installation'
  inputs:
    packageType: 'sdk'
    version: '6.0.428'
- task: NuGetToolInstaller@1
  name: 'NuggetToolInstaller'
  displayName: 'Nugget Tool Installer'

- task: NuGetCommand@2
  name: 'NuggetRestore'
  displayName: 'Restore Packages'
  inputs:
    command: 'restore'
    restoreSolution: '$(solution)'
    feedsToUse: 'select'

- task: DotNetCoreCLI@2
  name: 'Tests'
  displayName: 'Run tests'
  inputs:
    command: 'test'
    projects: '$(solution)'
    arguments: '--configuration $(buildConfiguration)'

- task: DotNetCoreCLI@2
  name: 'Publish'
  displayName: 'Publish'
  inputs:
    command: 'publish'
    publishWebProjects: false
    projects: '$(project)'
    arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
    zipAfterPublish: false

- task: PublishBuildArtifacts@1
  name: 'PublishArtifacts'
  displayName: 'Publish Artifacts'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'AzureTestProject'
    publishLocation: 'Container'